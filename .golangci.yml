run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - gosec
    - unused
    - ineffassign
    - typecheck
    - revive
    - gocyclo
    - misspell
    - unconvert
    - unparam
    - gosimple
    - bodyclose
    - noctx

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: false
    exclude-functions:
      - (io.Closer).Close
      - (*net/http.ResponseWriter).Write
      - (net/http.ResponseWriter).Write
      - io.WriteString
      - fmt.Fprintf
      - fmt.Fprintln
      - (*encoding/json.Encoder).Encode

  govet:
    enable-all: true
    disable:
      - shadow
      - fieldalignment

  gocyclo:
    min-complexity: 20

  staticcheck:
    checks: ["all"]

  gosec:
    severity: medium
    confidence: medium
    excludes:
      - G404

  revive:
    severity: warning
    enable-all-rules: false
    rules:
      - name: exported
        disabled: true
      - name: error-return
      - name: error-naming
      - name: if-return
      - name: var-naming
      - name: package-comments
        disabled: true
      - name: unexported-return
      - name: time-naming
      - name: context-as-argument
      - name: context-keys-type

  unused:
    check-exported: false

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - gosec
        - noctx
        - unparam
        - govet
